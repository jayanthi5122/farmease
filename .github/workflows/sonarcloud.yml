name: Python CI with Pytest, Migrations & SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev

      # 4. Upgrade pip, wheel, setuptools
      - name: Upgrade pip, wheel, setuptools
        run: |
          python -m pip install --upgrade pip wheel setuptools

      # 5. Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install pytest pytest-django pytest-cov pylint

      # 6. Apply Django migrations
      - name: Run Django Migrations
        run: |
          python manage.py migrate

      # 7. Run Pytest with coverage
      - name: Run Tests with Coverage
        run: |
          pytest --cov=main --cov-report=xml --cov-report=term

      # 8. Run Pylint
      - name: Run Pylint
        run: |
          pylint $(git ls-files '*.py') || true

      # 9. SonarCloud Scan
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v2
        with:
          organization: kishore-0501
          projectKey: kishore-0501_farmease
          token: ${{ secrets.SONAR_TOKEN }}
          extraProperties: |
            sonar.python.coverage.reportPaths=coverage.xml
