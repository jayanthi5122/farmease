name: CICD pipeline for FARMEASE app

on:
  push:
    branches:
      - main

jobs:
  farmease-job-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Python setup (SAFE VERSION)
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          sudo apt-get update
          sudo apt-get install -y libcairo2 libcairo2-dev libpango1.0-dev zip
          pip install -r requirements.txt
          pip install pytest pylint awscli

      # Run tests
      - name: Run tests
        run: |
          python -m pytest || true

      # Run pylint
      # - name: Run pylint
      #   run: |
      #     pylint --fail-under=7.0 $(git ls-files '*.py') || true

      # Run SonarCloud
      # - name: Run SonarCloud
      #   uses: sonarsource/sonarqube-scan-action@v4
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: https://sonarcloud.io
      #   with:
      #     args: >
      #       -Dsonar.projectKey=kishore-0501_farmease
      #       -Dsonar.organization=kishore-0501

      # Generate build ZIP
      - name: Generate zip files
        run: |
          zip -r farmease.zip . -x "*.git*" "venv*" "__pycache__*"

      # Upload build to S3 bucket
      - name: Upload to S3 bucket
        run: |
          aws s3 cp farmease.zip s3://elasticbeanstalk-us-east-1-028971169403/farmease.zip --region us-east-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: us-east-1

      # Deploy to Elastic Beanstalk
      - name: Deploy to EBS
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "farmease" \
            --version-label "deploy-${{ github.run_number }}" \
            --source-bundle S3Bucket="elasticbeanstalk-us-east-1-028971169403",S3Key="farmease.zip" \
            --region us-east-1

          aws elasticbeanstalk update-environment \
            --environment-name "farmease-env" \
            --version-label "deploy-${{ github.run_number }}" \
            --region us-east-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: us-east-1
