name: CICD pipeline for FARMEASE app

on:
  push:
    branches:
      - main

# -------------------- #
# 1️⃣ BUILD JOB
# -------------------- #
jobs:
  build:
    name: Build & Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          sudo apt-get update
          sudo apt-get install -y libcairo2 libcairo2-dev libpango1.0-dev zip
          pip install -r requirements.txt
          pip install pytest pylint awscli


# -------------------- #
# 2️⃣ TEST JOB
# -------------------- #
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build   # ✅ only runs if build succeeds

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest || true


# -------------------- #
# 3️⃣ PYLINT JOB
# -------------------- #
  lint:
    name: Code Quality (Pylint)
    runs-on: ubuntu-latest
    needs: test   # ✅ only runs if tests complete

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install pylint

      - name: Run pylint (SAFE)
        run: |
          pylint main --disable=import-error --fail-under=7.0 || true


# -------------------- #
# 4️⃣ SONARCLOUD JOB
# -------------------- #
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Run SonarCloud
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=kishore-0501_farmease
            -Dsonar.organization=kishore-0501


# -------------------- #
# 5️⃣ PACKAGE + UPLOAD JOB
# -------------------- #
  package:
    name: Package & Upload
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      - name: Zip application
        run: |
          zip -r farmease.zip . -x "*.git*" "venv*" "__pycache__*"

      - name: Upload to S3
        run: |
          aws s3 cp farmease.zip s3://elasticbeanstalk-us-east-1-028971169403/farmease.zip --region us-east-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: us-east-1


# -------------------- #
# 6️⃣ DEPLOY JOB
# -------------------- #
  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Deploy New Version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "farmease" \
            --version-label "deploy-${{ github.run_number }}" \
            --source-bundle S3Bucket="elasticbeanstalk-us-east-1-028971169403",S3Key="farmease.zip" \
            --region us-east-1

          aws elasticbeanstalk update-environment \
            --environment-name "farmease-env" \
            --version-label "deploy-${{ github.run_number }}" \
            --region us-east-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: us-east-1
