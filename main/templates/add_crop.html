{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Crop - FarmEase</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      padding: 40px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #2e7d32;
      margin-bottom: 30px;
      font-size: 28px;
    }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
      color: #333;
    }

    input[type=text],
    input[type=number],
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 16px;
      transition: border 0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #2e7d32;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      width: 100%;
      padding: 15px;
      background-color: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #1b5e20;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
      color: #2e7d32;
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #1b5e20;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Add New Crop</h2>
    <form method="POST">
      {% csrf_token %}

      <label>Crop Name:</label>
      <input type="text" name="crop_name" placeholder="Enter crop name" required>

      <label>Crop Type:</label>
      <input type="text" name="crop_type" placeholder="Enter crop type" required>

      <label>Quantity:</label>
      <input type="number" name="quantity" placeholder="Enter quantity" required>

      <label>Price per Unit:</label>
      <input type="number" step="0.01" name="price_per_unit" placeholder="Enter price per unit" required>

      <label>Description:</label>
      <textarea name="description" placeholder="Optional description"></textarea>

      <button type="submit">Add Crop</button>
    </form>

    <a href="{% url 'dashboard' %}" class="back-link">← Back to Dashboard</a>
  </div>
</body>
</html>
