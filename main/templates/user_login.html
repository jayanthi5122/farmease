{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Login - FarmEase</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
    }
    .container {
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #2e7d32;
    }
    input[type=email], input[type=password] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #1b5e20;
    }
    ul.messages {
      list-style-type: none;
      padding: 0;
      margin-bottom: 15px;
    }
    ul.messages li.error {
      background-color: #f8d7da;
      color: #842029;
      padding: 10px;
      border-radius: 4px;
    }
    ul.messages li.success {
      background-color: #d1e7dd;
      color: #0f5132;
      padding: 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>

    <!-- Display messages -->
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="{% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <!-- ✅ Complete Login Form -->
    <form method="POST">
      {% csrf_token %}
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <p style="text-align:center; margin-top: 15px;">
      Don’t have an account? <a href="{% url 'user_signup' %}">Sign up here</a>
    </p>
  </div>
</body>
</html>
