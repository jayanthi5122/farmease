{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container my-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h3>Place Order for {{ crop.crop_name }}</h3>
        </div>
        <div class="card-body">
            <p><strong>Crop Type:</strong> {{ crop.crop_type }}</p>
            <p><strong>Available Quantity:</strong> {{ crop.quantity }}</p>
            <p><strong>Price per Unit (€):</strong> {{ crop.price_per_unit }}</p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="quantity" class="form-label">Quantity to Buy</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" min="1" max="{{ crop.quantity }}" required>
                </div>
                <button type="submit" class="btn btn-success">Place Order</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
