<h2>Chat with {{ seller.username }}</h2>

<div>
  {% for msg in messages %}
    <p><b>{{ msg.sender.username }}:</b> {{ msg.message }}</p>
  {% endfor %}
</div>

<form method="post">
  {% csrf_token %}
  <input type="text" name="message" placeholder="Enter your message" required>
  <button type="submit">Send</button>
</form>
