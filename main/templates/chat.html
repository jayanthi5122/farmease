{% block content %}
<div class="container mt-4">

    <h4>Chat with {{ other_user.username }}</h4>

    <div class="border p-3 mb-3" style="height: 300px; overflow-y: scroll;">
        {% for msg in messages %}
            {% if msg.sender == request.user %}
                <p class="text-end"><b>You:</b> {{ msg.message }}</p>
            {% else %}
                <p><b>{{ other_user.username }}:</b> {{ msg.message }}</p>
            {% endif %}
        {% endfor %}
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="input-group">
            <input type="text" name="message" class="form-control" placeholder="Type message..." required>
            <button class="btn btn-primary">Send</button>
        </div>
    </form>

</div>
{% endblock %}
