{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Crop - FarmEase</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="container">
    <h2>Edit Crop</h2>
    <form method="POST">
      {% csrf_token %}
      <input type="text" name="name" value="{{ crop.name }}" required>
      <input type="number" name="quantity" value="{{ crop.quantity }}" required>
      <input type="number" step="0.01" name="price" value="{{ crop.price }}" required>
      <button type="submit">Update Crop</button>
    </form>
    <p><a href="{% url 'list_crops' %}">Back to Crop List</a></p>
  </div>
</body>
</html>
