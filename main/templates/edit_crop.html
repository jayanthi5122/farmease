{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container my-5">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Edit Crop</h2>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <!-- Edit Form -->
    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="crop_name" class="form-label">Crop Name</label>
                    <input type="text" class="form-control" id="crop_name" name="crop_name" value="{{ crop.crop_name }}" required>
                </div>

                <div class="mb-3">
                    <label for="crop_type" class="form-label">Crop Type</label>
                    <input type="text" class="form-control" id="crop_type" name="crop_type" value="{{ crop.crop_type }}" required>
                </div>

                <div class="mb-3">
                    <label for="quantity" class="form-label">Quantity</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" value="{{ crop.quantity }}" min="1" required>
                </div>

                <div class="mb-3">
                    <label for="price_per_unit" class="form-label">Price per Unit (€)</label>
                    <input type="number" step="0.01" class="form-control" id="price_per_unit" name="price_per_unit" value="{{ crop.price_per_unit }}" min="0" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3" required>{{ crop.description }}</textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-primary">Update Crop</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
