{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>📩 Buyer Messages</h3>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">⬅ Back to Dashboard</a>
    </div>

    {% if seller_chat_list %}
    <div class="list-group shadow">

        {% for chat in seller_chat_list %}
        <a href="{% url 'seller_chat_view' chat.sender.id %}" 
           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">

            <div>
                <strong>{{ chat.sender.first_name }}</strong><br>
                <small class="text-muted">{{ chat.message|truncatechars:40 }}</small>
            </div>

            <div class="text-end">
                <small class="text-muted">{{ chat.timestamp|date:"d M, H:i" }}</small>
            </div>

        </a>
        {% endfor %}

    </div>

    {% else %}
        <div class="alert alert-info text-center">
            No messages yet.
        </div>
    {% endif %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
