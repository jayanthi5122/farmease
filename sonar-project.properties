# ===============================
# SonarCloud project identification
# ===============================
sonar.projectKey=jayanthi-0501_farmease
sonar.organization=jayanthi-0501
sonar.host.url=https://sonarcloud.io
sonar.login=cf847d55deccfe52dab66c29f60420b84abcad27    

# ===============================
# Project metadata
# ===============================
sonar.projectName=FarmEase
sonar.projectVersion=1.0

# ===============================
# Source code location
# ===============================
# Points to the root directory of your Django project
sonar.sources=.

# ===============================
# Language and Python version
# ===============================
sonar.language=py
sonar.python.version=3.9

# ===============================
# Exclusions
# ===============================
# Ignore migrations, static files, virtual environment, and cache
sonar.exclusions=**/migrations/**, **/__pycache__/**, **/env/**, **/static/**

# ===============================
# Tests (optional but recommended)
# ===============================
# Include tests for coverage analysis
sonar.tests=.
sonar.test.inclusions=**/tests/**, **/test_*.py

# ===============================
# Coverage report
# ===============================
# Optional: if using pytest with coverage, point to the coverage.xml file
sonar.python.coverage.reportPaths=coverage.xml
