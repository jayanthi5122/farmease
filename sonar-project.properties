# SonarCloud project identification
sonar.projectKey=kishore_farmease
sonar.organization=kishore
sonar.host.url=https://sonarcloud.io
sonar.login=${SONAR_TOKEN}

# Source code location
sonar.sources=.

# Python settings
sonar.language=py
sonar.python.version=3.9

# Exclude migrations, virtual environments, and cache
sonar.exclusions=**/migrations/**, **/__pycache__/**, **/env/**

# Coverage report (optional if using pytest coverage)
sonar.python.coverage.reportPaths=coverage.xml
